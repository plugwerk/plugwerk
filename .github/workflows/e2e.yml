name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: plugwerk-server/plugwerk-server-frontend/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Pre-pull Docker images (with retry)
        run: |
          for i in 1 2 3; do
            docker pull postgres:18-alpine && break
            echo "Pull attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Run E2E smoke test
        run: ./scripts/smoke-test.sh
        env:
          PLUGWERK_AUTH_ADMIN_PASSWORD: admin
          PLUGWERK_AUTH_JWT_SECRET: ci-smoke-test-secret-min-32-characters!!
          PLUGWERK_AUTH_ENCRYPTION_KEY: ci-encrypt-16chr
