name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugwerk-server/plugwerk-server-frontend/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Pre-pull Docker images (with retry)
        run: |
          for i in 1 2 3; do
            docker pull postgres:18-alpine && break
            echo "Pull attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Run E2E smoke test
        run: ./scripts/smoke-test.sh
        env:
          PLUGWERK_AUTH_ADMIN_PASSWORD: admin
          PLUGWERK_AUTH_JWT_SECRET: ci-smoke-test-secret-min-32-characters!!
          PLUGWERK_AUTH_ENCRYPTION_KEY: ci-encrypt-16chr
