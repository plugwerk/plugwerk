name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugwerk-server/plugwerk-server-frontend/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Pre-pull Docker images (with retry)
        run: |
          for i in 1 2 3; do
            docker pull postgres:18-alpine && break
            echo "Pull attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Run E2E smoke test
        run: ./scripts/smoke-test.sh
        env:
          PLUGWERK_PASSWORD: admin
          PLUGWERK_AUTH_ADMIN_PASSWORD: admin
