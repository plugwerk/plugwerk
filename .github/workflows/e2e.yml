name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: plugwerk-server/plugwerk-server-frontend/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Pre-pull Docker images (with retry)
        run: |
          for i in 1 2 3; do
            docker pull postgres:18-alpine && break
            echo "Pull attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Run E2E smoke test
        run: ./scripts/smoke-test.sh
        env:
          PLUGWERK_AUTH_ADMIN_PASSWORD: admin
          PLUGWERK_AUTH_JWT_SECRET: ci-smoke-test-secret-min-32-characters!!
          PLUGWERK_AUTH_ENCRYPTION_KEY: ci-encrypt-16chr
          # The boot fires the server-start beacon and the flow triggers activation
          # events; each CI run is a fresh install (new UUID), so leaving telemetry
          # on would register every run as a new install in analytics. Opt out.
          PLUGWERK_TELEMETRY: "false"

  # Browser-driven UI E2E (issue #241). Builds the server JAR (which embeds the
  # production frontend bundle), runs it against a real PostgreSQL, then drives
  # the app with Playwright/Chromium exactly as a user would.
  playwright-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      FRONTEND_DIR: plugwerk-server/plugwerk-server-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: plugwerk-server/plugwerk-server-frontend/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Pre-pull Docker images (with retry)
        run: |
          for i in 1 2 3; do
            docker pull postgres:18-alpine && break
            echo "Pull attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Build server JAR (embeds the production frontend bundle)
        run: ./gradlew :plugwerk-server:plugwerk-server-backend:bootJar

      - name: Install frontend deps + Playwright Chromium
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start PostgreSQL
        run: docker compose up -d postgres
        env:
          # Only needed so Compose can interpolate the (unused) server service block.
          PLUGWERK_AUTH_JWT_SECRET: ci-e2e-jwt-secret-min-32-characters!!
          PLUGWERK_AUTH_ENCRYPTION_KEY: ci-encrypt-16chr
          PLUGWERK_AUTH_ADMIN_PASSWORD: admin

      - name: Start server and run Playwright E2E
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          PLUGWERK_DB_URL: jdbc:postgresql://localhost:5432/plugwerk
          PLUGWERK_DB_USERNAME: plugwerk
          PLUGWERK_DB_PASSWORD: plugwerk
          PLUGWERK_AUTH_JWT_SECRET: ci-e2e-jwt-secret-min-32-characters!!
          PLUGWERK_AUTH_ENCRYPTION_KEY: ci-encrypt-16chr
          PLUGWERK_AUTH_ADMIN_PASSWORD: admin
          # Browser drops Secure refresh cookies over plain-HTTP localhost.
          PLUGWERK_AUTH_COOKIE_SECURE: "false"
          # Each test mints its own session (single-use refresh token), so many
          # logins arrive from one IP — lift the login rate limit.
          PLUGWERK_AUTH_RATE_LIMIT_MAX_ATTEMPTS: "10000"
          # Default artifact root (/var/plugwerk) is not writable on the runner.
          PLUGWERK_STORAGE_ROOT: ${{ runner.temp }}/plugwerk-artifacts
          # Opt out of telemetry: boot fires the server-start beacon and the browser
          # scenarios trigger activation events. Each run is a fresh install (new
          # UUID), so leaving it on registers every CI run as a new analytics install.
          PLUGWERK_TELEMETRY: "false"
        run: |
          java -jar ../plugwerk-server-backend/build/libs/*.jar \
            > "$RUNNER_TEMP/plugwerk-server.log" 2>&1 &
          echo "waiting for the server to become healthy…"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "server is UP"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "::error::server did not become healthy in time"
              tail -n 120 "$RUNNER_TEMP/plugwerk-server.log"
              exit 1
            fi
            sleep 2
          done
          npm run e2e

      - name: Dump server log on failure
        if: failure()
        run: tail -n 200 "$RUNNER_TEMP/plugwerk-server.log" || true

      - name: Upload Playwright report + traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            plugwerk-server/plugwerk-server-frontend/playwright-report/
            plugwerk-server/plugwerk-server-frontend/test-results/
          retention-days: 14
          if-no-files-found: ignore
