name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Reject SNAPSHOT tags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::SNAPSHOT versions must not be published to Maven Central: $VERSION"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish to Maven Central
        run: ./gradlew publishAggregationToCentralPortal -Pversion=${{ steps.version.outputs.VERSION }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Publish to GitHub Packages
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository -Pversion=${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Upload backend fat JAR for docker-publish job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plugwerk-server-backend-jar
          path: plugwerk-server/plugwerk-server-backend/build/libs/plugwerk-server-backend-${{ steps.version.outputs.VERSION }}.jar
          if-no-files-found: error
          retention-days: 1

      - name: Collect release artifacts
        id: artifacts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          STAGING_DIR="$(mktemp -d)"

          # Publishable library JARs
          for MODULE in plugwerk-spi plugwerk-descriptor plugwerk-client-plugin; do
            JAR="${MODULE}/build/libs/${MODULE}-${VERSION}.jar"
            if [[ -f "$JAR" ]]; then
              cp "$JAR" "$STAGING_DIR/"
            fi
          done

          # plugwerk-api-model (nested module path)
          API_JAR="plugwerk-api/plugwerk-api-model/build/libs/plugwerk-api-model-${VERSION}.jar"
          if [[ -f "$API_JAR" ]]; then
            cp "$API_JAR" "$STAGING_DIR/"
          fi

          # PF4J plugin ZIP
          ZIP="plugwerk-client-plugin/build/pf4j/plugwerk-client-plugin-${VERSION}.zip"
          if [[ -f "$ZIP" ]]; then
            cp "$ZIP" "$STAGING_DIR/"
          fi

          # Server distribution ZIP
          DIST_ZIP="plugwerk-server/plugwerk-server-backend/build/dist/plugwerk-server-${VERSION}.zip"
          if [[ -f "$DIST_ZIP" ]]; then
            cp "$DIST_ZIP" "$STAGING_DIR/"
          fi

          echo "STAGING_DIR=$STAGING_DIR" >> "$GITHUB_OUTPUT"
          echo "📦 Collected artifacts:"
          ls -lh "$STAGING_DIR/"

      - name: Create GitHub Release
        # release.yml owns the GitHub Release lifecycle. Previously
        # prepare-release.yml created it after waiting for release.yml to
        # finish, while release.yml waited 5 minutes for that release to
        # appear before falling back to creating it itself; the two
        # workflows deadlocked and prepare-release's create step then
        # failed with HTTP 422 "tag_name already exists". Now there is
        # exactly one creator: this step.
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          echo "📦 Creating GitHub Release $TAG..."
          gh release create "$TAG" --title "$TAG" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets to GitHub Release
        run: |
          STAGING_DIR="${{ steps.artifacts.outputs.STAGING_DIR }}"
          TAG="v${{ steps.version.outputs.VERSION }}"
          echo "📤 Uploading assets to GitHub Release $TAG..."
          gh release upload "$TAG" "$STAGING_DIR"/* --clobber
          echo "✅ Assets uploaded"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync OpenAPI spec to website
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          repository: plugwerk/website
          event-type: openapi-update
          client-payload: '{"version": "${{ steps.version.outputs.VERSION }}"}'

      - name: Sync docker-compose.yml to website
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          repository: plugwerk/website
          event-type: docker-compose-update
          client-payload: '{"version": "${{ steps.version.outputs.VERSION }}"}'

  docker-publish:
    name: Build and push Docker image
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download backend fat JAR from publish job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: plugwerk-server-backend-jar
          path: plugwerk-server/plugwerk-server-backend/src/dist/

      - name: Verify staged JAR is present
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          STAGED="plugwerk-server/plugwerk-server-backend/src/dist/plugwerk-server-backend-${VERSION}.jar"
          test -f "$STAGED" || { echo "::error::Staged JAR missing: $STAGED"; exit 1; }
          ls -lh "$STAGED"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            plugwerk/plugwerk-server
            ghcr.io/plugwerk/plugwerk-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=auto
          labels: |
            org.opencontainers.image.title=Plugwerk Server
            org.opencontainers.image.description=Plugin management and marketplace software for the Java/PF4J ecosystem.
            org.opencontainers.image.source=https://github.com/plugwerk/plugwerk
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: plugwerk-server/plugwerk-server-backend/src/dist
          file: plugwerk-server/plugwerk-server-backend/src/dist/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync Docker Hub README
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: plugwerk/plugwerk-server
          short-description: Plugin management and marketplace software for the Java/PF4J ecosystem
          readme-filepath: ./docker/dockerhub-readme.md
