name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: plugwerk-server/plugwerk-server-frontend/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # Spotless runs isolated, before the main build: its formatter classloader
      # is flaky under concurrent task load (diffplug/spotless#2850 — backing JAR
      # closed mid-build → NoClassDefFoundError). Standalone invocation is
      # reliable; see plugwerk#563 for the investigation.
      - name: Spotless check (isolated)
        run: ./gradlew spotlessCheck

      - name: Build and run unit tests
        run: ./gradlew build -x spotlessCheck

      - name: Pre-pull Docker images (with retry)
        run: |
          for i in 1 2 3; do
            docker pull postgres:18-alpine && break
            echo "Pull attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Run integration tests
        run: ./gradlew :plugwerk-server:plugwerk-server-backend:integrationTest
        env:
          PLUGWERK_AUTH_JWT_SECRET: ci-integration-test-secret-min-32-characters!!
          PLUGWERK_AUTH_ENCRYPTION_KEY: ci-encrypt-16chr

      # Coverage report over the merged unit + integration exec data. The
      # build step above produced build/jacoco/test.exec; the step above that
      # produced build/jacoco/integrationTest.exec — jacocoTestReport reads
      # both (see plugwerk-server-backend/build.gradle.kts, DEV-30).
      - name: Coverage report (merged unit + integration)
        run: ./gradlew :plugwerk-server:plugwerk-server-backend:jacocoTestReport

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-coverage-report
          path: |
            plugwerk-server/plugwerk-server-backend/build/reports/jacoco/test/html/
            plugwerk-server/plugwerk-server-backend/build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 14

      # Coverage gate. Fails the build when coverage drops below the ratchet
      # floors defined in build.gradle.kts. Runs last so the report artifact
      # above is always published, even on a gate failure.
      - name: Coverage gate
        run: ./gradlew :plugwerk-server:plugwerk-server-backend:jacocoTestCoverageVerification

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-reports
          path: |
            plugwerk-server/plugwerk-server-backend/build/reports/tests/test/
            plugwerk-server/plugwerk-server-backend/build/test-results/test/
          retention-days: 14

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-reports
          path: |
            plugwerk-server/plugwerk-server-backend/build/reports/tests/integrationTest/
            plugwerk-server/plugwerk-server-backend/build/test-results/integrationTest/
          retention-days: 14
