# =============================================================================
# Plugwerk Server — Application Configuration
# =============================================================================

spring:
  application:
    name: plugwerk-server

  datasource:
    url: ${PLUGWERK_DB_URL:jdbc:postgresql://localhost:5432/plugwerk}
    username: ${PLUGWERK_DB_USERNAME:plugwerk}
    password: ${PLUGWERK_DB_PASSWORD:plugwerk}

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  servlet:
    multipart:
      max-file-size: ${PLUGWERK_UPLOAD_MAX_FILE_SIZE_MB:100}MB
      max-request-size: ${PLUGWERK_UPLOAD_MAX_FILE_SIZE_MB:100}MB

  jackson:
    deserialization:
      fail-on-unknown-properties: false

plugwerk:
  storage:
    type: ${PLUGWERK_STORAGE_TYPE:fs}
    fs:
      root: ${PLUGWERK_STORAGE_ROOT:/var/plugwerk/artifacts}
  server:
    base-url: ${PLUGWERK_BASE_URL:http://localhost:8080}
  auth:
    # HMAC-SHA256 signing key for self-issued JWTs.
    # Minimum 32 characters. Must be kept secret and rotated if compromised.
    # REQUIRED — the server will refuse to start without this value.
    # Generate with: openssl rand -base64 32
    # Env: PLUGWERK_JWT_SECRET
    jwt-secret: ${PLUGWERK_JWT_SECRET:}

    # AES encryption key for OIDC provider client secrets at rest.
    # Must be exactly 16 characters (AES-128).
    # REQUIRED — the server will refuse to start without this value.
    # Generate with: openssl rand -hex 8
    # Env: PLUGWERK_ENCRYPTION_KEY
    encryption-key: ${PLUGWERK_ENCRYPTION_KEY:}

    # How long a JWT token remains valid after issuance.
    # Default: 8 hours. Increase for long-running CLI tools; decrease for higher security.
    # No environment variable override — change this value directly when needed.
    token-validity-hours: 8

  # Maximum allowed plugin artifact file size in MB.
  # Files exceeding this limit are rejected with HTTP 413 (Payload Too Large).
  # Env: PLUGWERK_UPLOAD_MAX_FILE_SIZE_MB
  upload:
    max-file-size-mb: ${PLUGWERK_UPLOAD_MAX_FILE_SIZE_MB:100}

  # Download event tracking (audit log).
  # Records individual download events in the download_event table.
  # The atomic download_count counter on plugin_release is always incremented regardless.
  tracking:
    # Master switch — set to false to disable event recording entirely.
    # Env: PLUGWERK_TRACKING_ENABLED
    enabled: ${PLUGWERK_TRACKING_ENABLED:true}
    # Whether to capture the client IP address. Default: true.
    # Env: PLUGWERK_TRACKING_CAPTURE_IP
    capture-ip: ${PLUGWERK_TRACKING_CAPTURE_IP:true}
    # Anonymize IPs to /24 (IPv4) or /48 (IPv6) before storage. Default: true.
    # Env: PLUGWERK_TRACKING_ANONYMIZE_IP
    anonymize-ip: ${PLUGWERK_TRACKING_ANONYMIZE_IP:true}
    # Whether to capture the HTTP User-Agent header. Default: true.
    # Env: PLUGWERK_TRACKING_CAPTURE_USER_AGENT
    capture-user-agent: ${PLUGWERK_TRACKING_CAPTURE_USER_AGENT:true}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
