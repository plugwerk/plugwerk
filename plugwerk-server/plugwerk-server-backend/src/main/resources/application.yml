# =============================================================================
# Plugwerk Server — Application Configuration
# =============================================================================

spring:
  application:
    name: plugwerk-server

  datasource:
    url: ${PLUGWERK_DB_URL:jdbc:postgresql://localhost:5432/plugwerk}
    username: ${PLUGWERK_DB_USERNAME:plugwerk}
    password: ${PLUGWERK_DB_PASSWORD:plugwerk}

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jackson:
    deserialization:
      fail-on-unknown-properties: false

plugwerk:
  storage:
    type: ${PLUGWERK_STORAGE_TYPE:fs}
    fs:
      root: ${PLUGWERK_STORAGE_ROOT:/var/plugwerk/artifacts}
  server:
    base-url: ${PLUGWERK_BASE_URL:http://localhost:8080}
  auth:
    jwt-secret: ${PLUGWERK_JWT_SECRET:dev-secret-change-in-production-min32chars!!}
    token-validity-hours: 8
    dev-users:
      - username: test
        password: test

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
