# =============================================================================
# Plugwerk Server — Application Configuration
# =============================================================================

spring:
  application:
    name: plugwerk-server

  datasource:
    url: ${PLUGWERK_DB_URL:jdbc:postgresql://localhost:5432/plugwerk}
    username: ${PLUGWERK_DB_USERNAME:plugwerk}
    password: ${PLUGWERK_DB_PASSWORD:plugwerk}

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  # Spring's servlet multipart limits are set programmatically at bean-creation time from
  # the `upload.max_file_size_mb` setting in `application_setting` (see MultipartConfig.kt).
  # A hard safety ceiling of 1 GB is applied by the MultipartConfig bean regardless of the
  # DB value — see SettingKey.MAX_ALLOWED_UPLOAD_MB and ADR-0016.

  jackson:
    deserialization:
      fail-on-unknown-properties: false

plugwerk:
  storage:
    type: ${PLUGWERK_STORAGE_TYPE:fs}
    fs:
      root: ${PLUGWERK_STORAGE_ROOT:/var/plugwerk/artifacts}
  server:
    base-url: ${PLUGWERK_BASE_URL:http://localhost:8080}
    # CORS configuration. See ADR-0021.
    # Default allowed-origins is empty = same-origin-only, which matches the bundled-frontend
    # deployment model. Add origins only if the frontend is deployed separately from the backend.
    cors:
      # Comma-separated exact origin values (scheme + host + port). Case-sensitive.
      # Env: PLUGWERK_SERVER_CORS_ALLOWED_ORIGINS
      allowed-origins: ${PLUGWERK_SERVER_CORS_ALLOWED_ORIGINS:}
      # Env: PLUGWERK_SERVER_CORS_ALLOWED_METHODS
      allowed-methods: ${PLUGWERK_SERVER_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      # Env: PLUGWERK_SERVER_CORS_ALLOWED_HEADERS
      allowed-headers: ${PLUGWERK_SERVER_CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Api-Key}
      # Must be false when allowed-origins contains "*" — startup validator enforces this.
      # Env: PLUGWERK_SERVER_CORS_ALLOW_CREDENTIALS
      allow-credentials: ${PLUGWERK_SERVER_CORS_ALLOW_CREDENTIALS:true}
      # Preflight cache duration in seconds (0 to 86400).
      # Env: PLUGWERK_SERVER_CORS_MAX_AGE
      max-age: ${PLUGWERK_SERVER_CORS_MAX_AGE:3600}
  auth:
    # HMAC-SHA256 signing key for self-issued JWTs.
    # Minimum 32 characters. Must be kept secret and rotated if compromised.
    # REQUIRED — the server will refuse to start without this value.
    # Generate with: openssl rand -base64 32
    # Env: PLUGWERK_AUTH_JWT_SECRET
    jwt-secret: ${PLUGWERK_AUTH_JWT_SECRET:}

    # Password for the AES-256-CBC text encryptor (PBKDF2-derived key) that protects
    # OIDC provider client secrets at rest. Length controls PBKDF2 input entropy — the
    # AES key size is always 256 bits. Minimum 16 characters; 32+ recommended.
    # REQUIRED — the server will refuse to start without this value. See ADR-0022.
    # Generate with: openssl rand -base64 32   (recommended)
    #            or: openssl rand -hex 8       (legacy minimum)
    # Env: PLUGWERK_AUTH_ENCRYPTION_KEY
    encryption-key: ${PLUGWERK_AUTH_ENCRYPTION_KEY:}

    # How long a JWT token remains valid after issuance.
    # Default: 8 hours. Increase for long-running CLI tools; decrease for higher security.
    # No environment variable override — change this value directly when needed.
    token-validity-hours: 8

    # Brute-force protection for authentication endpoints.
    # Uses an in-memory token bucket (Bucket4j + Caffeine).
    # Exceeding a limit returns HTTP 429 with a Retry-After header.
    rate-limit:
      # Maximum login attempts per IP within the time window.
      # Env: PLUGWERK_AUTH_RATE_LIMIT_MAX_ATTEMPTS
      max-attempts: ${PLUGWERK_AUTH_RATE_LIMIT_MAX_ATTEMPTS:10}
      # Time window in seconds. Buckets auto-expire after this period.
      # Env: PLUGWERK_AUTH_RATE_LIMIT_WINDOW_SECONDS
      window-seconds: ${PLUGWERK_AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
      # Change-password rate limiting (keyed by authenticated subject).
      # Independent bucket — login attempts and change-password attempts never share state.
      change-password:
        # Maximum change-password attempts per subject within the time window.
        # Env: PLUGWERK_AUTH_RATE_LIMIT_CHANGE_PASSWORD_MAX_ATTEMPTS
        max-attempts: ${PLUGWERK_AUTH_RATE_LIMIT_CHANGE_PASSWORD_MAX_ATTEMPTS:5}
        # Env: PLUGWERK_AUTH_RATE_LIMIT_CHANGE_PASSWORD_WINDOW_SECONDS
        window-seconds: ${PLUGWERK_AUTH_RATE_LIMIT_CHANGE_PASSWORD_WINDOW_SECONDS:300}

  # Upload and download-tracking settings were moved to the `application_setting` database
  # table in 1.0.0-alpha.2 (ADR-0016). The environment variables PLUGWERK_UPLOAD_MAX_FILE_SIZE_MB,
  # PLUGWERK_TRACKING_ENABLED, PLUGWERK_TRACKING_CAPTURE_IP, PLUGWERK_TRACKING_ANONYMIZE_IP and
  # PLUGWERK_TRACKING_CAPTURE_USER_AGENT are no longer read. Manage these values via the
  # Admin UI or the `PATCH /api/v1/admin/settings` endpoint.

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
