# =============================================================================
# Plugwerk Server — Application Configuration
# =============================================================================

spring:
  application:
    name: plugwerk-server

  datasource:
    url: ${PLUGWERK_DB_URL:jdbc:postgresql://localhost:5432/plugwerk}
    username: ${PLUGWERK_DB_USERNAME:plugwerk}
    password: ${PLUGWERK_DB_PASSWORD:plugwerk}

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jackson:
    deserialization:
      fail-on-unknown-properties: false

plugwerk:
  storage:
    type: ${PLUGWERK_STORAGE_TYPE:fs}
    fs:
      root: ${PLUGWERK_STORAGE_ROOT:/var/plugwerk/artifacts}
  server:
    base-url: ${PLUGWERK_BASE_URL:http://localhost:8080}
  auth:
    # HMAC-SHA256 signing key for self-issued JWTs.
    # Minimum 32 characters. Must be kept secret and rotated if compromised.
    # NEVER use the default value in production — set PLUGWERK_JWT_SECRET in the environment.
    # Phase 2+: replace with an external OIDC provider and remove this property.
    # Env: PLUGWERK_JWT_SECRET  Example: "change-me-use-openssl-rand-base64-32"
    jwt-secret: ${PLUGWERK_JWT_SECRET:dev-secret-change-in-production-min32chars!!}

    # How long a JWT token remains valid after issuance.
    # Default: 8 hours. Increase for long-running CLI tools; decrease for higher security.
    # No environment variable override — change this value directly when needed.
    token-validity-hours: 8

    # Provisional Phase 1 user list. Credentials are validated in plain text.
    # Phase 2+: replace with a database-backed UserCredentialValidator or OIDC provider.
    # WARNING: Do not add real user passwords here. This list is committed to source control.
    # Env: not overridable via env vars — configure via Spring Boot config server for production.
    dev-users:
      - username: test
        password: test

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
