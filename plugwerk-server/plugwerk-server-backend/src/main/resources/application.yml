# =============================================================================
# Plugwerk Server — Application Configuration
# =============================================================================

spring:
  application:
    name: plugwerk-server

  datasource:
    url: ${PLUGWERK_DB_URL:jdbc:postgresql://localhost:5432/plugwerk}
    username: ${PLUGWERK_DB_USERNAME:plugwerk}
    password: ${PLUGWERK_DB_PASSWORD:plugwerk}
    # HikariCP pool sizing. Defaults are tuned for managed Postgres with a
    # client-facing connection pooler (e.g. Supabase Supavisor / PgBouncer in
    # transaction mode), where the server-side pool already multiplexes — so
    # the JDBC pool itself should stay small and connections short-lived.
    # For a dedicated Postgres instance you can raise maximum-pool-size.
    hikari:
      # Env: PLUGWERK_DB_POOL_MAX_SIZE
      maximum-pool-size: ${PLUGWERK_DB_POOL_MAX_SIZE:5}
      # Env: PLUGWERK_DB_POOL_MIN_IDLE
      minimum-idle: ${PLUGWERK_DB_POOL_MIN_IDLE:1}
      # Idle connections older than this are released back to the pooler.
      # Env: PLUGWERK_DB_POOL_IDLE_TIMEOUT_MS
      idle-timeout: ${PLUGWERK_DB_POOL_IDLE_TIMEOUT_MS:30000}
      # Hard cap on a single physical connection's lifetime. Keep below the
      # pooler's own timeout to avoid mid-query disconnects.
      # Env: PLUGWERK_DB_POOL_MAX_LIFETIME_MS
      max-lifetime: ${PLUGWERK_DB_POOL_MAX_LIFETIME_MS:600000}
      # Fail fast if a connection cannot be acquired within this window.
      # Env: PLUGWERK_DB_POOL_CONNECTION_TIMEOUT_MS
      connection-timeout: ${PLUGWERK_DB_POOL_CONNECTION_TIMEOUT_MS:30000}

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  # Spring's servlet multipart limits are set programmatically at bean-creation time from
  # the `upload.max_file_size_mb` setting in `application_setting` (see MultipartConfig.kt).
  # A hard safety ceiling of 1 GB is applied by the MultipartConfig bean regardless of the
  # DB value — see SettingKey.MAX_ALLOWED_UPLOAD_MB and ADR-0016.

  jackson:
    deserialization:
      fail-on-unknown-properties: false

plugwerk:
  storage:
    # Storage backend selector. `fs` = local filesystem (single-node, default).
    # `s3` = S3-compatible object storage (AWS S3, MinIO, Hetzner OS, Cloudflare R2).
    # Env: PLUGWERK_STORAGE_TYPE
    type: ${PLUGWERK_STORAGE_TYPE:fs}

    # Filesystem-backend settings — only used when type=fs.
    fs:
      root: ${PLUGWERK_STORAGE_ROOT:/var/plugwerk/artifacts}

    # S3-compatible-backend settings — only used when type=s3 (#191).
    # `bucket` and `region` are required when type=s3. The bucket must already
    # exist; Plugwerk does not create buckets.
    s3:
      # Env: PLUGWERK_STORAGE_S3_BUCKET
      bucket: ${PLUGWERK_STORAGE_S3_BUCKET:}
      # AWS region or region-compatible identifier (`auto`, `us-east-1` for
      # non-AWS endpoints).
      # Env: PLUGWERK_STORAGE_S3_REGION
      region: ${PLUGWERK_STORAGE_S3_REGION:}
      # Override the endpoint for non-AWS S3-compatible providers. Leave blank
      # for AWS S3 (the SDK derives the endpoint from region).
      # Examples:
      #   MinIO local:    http://localhost:9000
      #   Cloudflare R2:  https://<account>.r2.cloudflarestorage.com
      #   Hetzner OS:     https://fsn1.your-objectstorage.com
      # Env: PLUGWERK_STORAGE_S3_ENDPOINT
      endpoint: ${PLUGWERK_STORAGE_S3_ENDPOINT:}
      # When BOTH accessKey AND secretKey are set, static credentials are used.
      # When BOTH are blank, the SDK falls back to the DefaultCredentialsProvider
      # (env, instance profile, IRSA, ECS task role). Half-configured states
      # (one set, one blank) are rejected at startup.
      # Env: PLUGWERK_STORAGE_S3_ACCESS_KEY
      access-key: ${PLUGWERK_STORAGE_S3_ACCESS_KEY:}
      # Env: PLUGWERK_STORAGE_S3_SECRET_KEY
      secret-key: ${PLUGWERK_STORAGE_S3_SECRET_KEY:}
      # Optional prefix prepended to every artifact key. Lets multiple Plugwerk
      # installations share one bucket (e.g. "prod/plugwerk/"). Must NOT start
      # with '/'.
      # Env: PLUGWERK_STORAGE_S3_KEY_PREFIX
      key-prefix: ${PLUGWERK_STORAGE_S3_KEY_PREFIX:}
      # `true` for MinIO and other endpoints that do not support virtual-hosted
      # style URLs. Default `false` (DNS-style; works for AWS S3, R2, Hetzner).
      # Env: PLUGWERK_STORAGE_S3_PATH_STYLE_ACCESS
      path-style-access: ${PLUGWERK_STORAGE_S3_PATH_STYLE_ACCESS:false}
      # Refuse to start when the bucket-existence probe fails at startup.
      # Default false → probe failure logs ERROR and server keeps running so the
      # operator can fix the bucket without a restart loop. Set true in container
      # orchestrators that already have a restart loop and prefer fail-closed.
      # Env: PLUGWERK_STORAGE_S3_FAIL_FAST_ON_BUCKET_MISSING
      fail-fast-on-bucket-missing: ${PLUGWERK_STORAGE_S3_FAIL_FAST_ON_BUCKET_MISSING:false}
  server:
    base-url: ${PLUGWERK_BASE_URL:http://localhost:8080}
    # Frontend base URL for browser-facing links emitted by the server (e.g. the
    # verification link in #420 self-registration emails). Defaults to base-url
    # because the bundled-SPA deployment serves both from the same origin. Override
    # in local dev where Vite runs on a different port:
    #   PLUGWERK_WEB_BASE_URL=http://localhost:5173
    web-base-url: ${PLUGWERK_WEB_BASE_URL:}
    # CORS configuration. See ADR-0021.
    # Default allowed-origins is empty = same-origin-only, which matches the bundled-frontend
    # deployment model. Add origins only if the frontend is deployed separately from the backend.
    cors:
      # Comma-separated exact origin values (scheme + host + port). Case-sensitive.
      # Env: PLUGWERK_SERVER_CORS_ALLOWED_ORIGINS
      allowed-origins: ${PLUGWERK_SERVER_CORS_ALLOWED_ORIGINS:}
      # Env: PLUGWERK_SERVER_CORS_ALLOWED_METHODS
      allowed-methods: ${PLUGWERK_SERVER_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      # Env: PLUGWERK_SERVER_CORS_ALLOWED_HEADERS
      allowed-headers: ${PLUGWERK_SERVER_CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Api-Key}
      # Must be false when allowed-origins contains "*" — startup validator enforces this.
      # Env: PLUGWERK_SERVER_CORS_ALLOW_CREDENTIALS
      allow-credentials: ${PLUGWERK_SERVER_CORS_ALLOW_CREDENTIALS:true}
      # Preflight cache duration in seconds (0 to 86400).
      # Env: PLUGWERK_SERVER_CORS_MAX_AGE
      max-age: ${PLUGWERK_SERVER_CORS_MAX_AGE:3600}
  auth:
    # HMAC-SHA256 signing key for self-issued JWTs.
    # Minimum 32 characters. Must be kept secret and rotated if compromised.
    # REQUIRED — the server will refuse to start without this value.
    # Generate with: openssl rand -base64 32
    # Env: PLUGWERK_AUTH_JWT_SECRET
    jwt-secret: ${PLUGWERK_AUTH_JWT_SECRET:}

    # Password for the AES-256-CBC text encryptor (PBKDF2-derived key) that protects
    # OIDC provider client secrets at rest. Length controls PBKDF2 input entropy — the
    # AES key size is always 256 bits. Minimum 16 characters; 32+ recommended.
    # REQUIRED — the server will refuse to start without this value. See ADR-0022.
    # Generate with: openssl rand -base64 32   (recommended)
    #            or: openssl rand -hex 8       (legacy minimum)
    # Env: PLUGWERK_AUTH_ENCRYPTION_KEY
    encryption-key: ${PLUGWERK_AUTH_ENCRYPTION_KEY:}

    # How long a JWT token remains valid after issuance.
    # Default: 8 hours. Increase for long-running CLI tools; decrease for higher security.
    # No environment variable override — change this value directly when needed.
    token-validity-hours: 8

    # Reverse-proxy trust list for X-Forwarded-For (SBS-006 / #265).
    # Comma-separated CIDR ranges of trusted reverse proxies. The leftmost
    # X-Forwarded-For value is honoured ONLY when the request's remoteAddr
    # matches one of these ranges. Empty default = X-Forwarded-For is ignored
    # entirely, which is the secure choice for a server with no proxy in front.
    #
    # WARNING for operators behind nginx / ALB / Traefik / CloudFront: leaving
    # this empty causes every client to be rate-limited as if it were the
    # proxy IP, collapsing per-IP rate-limit buckets to one shared bucket for
    # the whole user base. You MUST set this to your proxy's egress IPs.
    # Examples:
    #   PLUGWERK_AUTH_TRUSTED_PROXY_CIDRS=10.0.0.0/8,127.0.0.1/32
    #   PLUGWERK_AUTH_TRUSTED_PROXY_CIDRS=192.168.0.0/16
    # Env: PLUGWERK_AUTH_TRUSTED_PROXY_CIDRS
    trusted-proxy-cidrs: ${PLUGWERK_AUTH_TRUSTED_PROXY_CIDRS:}

    # Brute-force protection for authentication endpoints.
    # Uses an in-memory token bucket (Bucket4j + Caffeine).
    # Exceeding a limit returns HTTP 429 with a Retry-After header.
    rate-limit:
      # Maximum login attempts per IP within the time window.
      # Env: PLUGWERK_AUTH_RATE_LIMIT_MAX_ATTEMPTS
      max-attempts: ${PLUGWERK_AUTH_RATE_LIMIT_MAX_ATTEMPTS:10}
      # Time window in seconds. Buckets auto-expire after this period.
      # Env: PLUGWERK_AUTH_RATE_LIMIT_WINDOW_SECONDS
      window-seconds: ${PLUGWERK_AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
      # Change-password rate limiting (keyed by authenticated subject).
      # Independent bucket — login attempts and change-password attempts never share state.
      change-password:
        # Maximum change-password attempts per subject within the time window.
        # Env: PLUGWERK_AUTH_RATE_LIMIT_CHANGE_PASSWORD_MAX_ATTEMPTS
        max-attempts: ${PLUGWERK_AUTH_RATE_LIMIT_CHANGE_PASSWORD_MAX_ATTEMPTS:5}
        # Env: PLUGWERK_AUTH_RATE_LIMIT_CHANGE_PASSWORD_WINDOW_SECONDS
        window-seconds: ${PLUGWERK_AUTH_RATE_LIMIT_CHANGE_PASSWORD_WINDOW_SECONDS:300}

    # Actuator scrape-account configuration (SBS-004 / #292). See ADR-0025.
    # `/actuator/health` is always public. `/actuator/info` and `/actuator/prometheus`
    # require a superadmin JWT by default; set BOTH values below to additionally allow
    # a dedicated HTTP Basic scrape account for unattended Prometheus scraping.
    # Leave both blank to keep the endpoints superadmin-only (recommended default).
    actuator:
      # Scrape account username. Conventionally `prometheus` or the scraper's
      # service-account name. Must be set together with scrape-password.
      # Env: PLUGWERK_AUTH_ACTUATOR_SCRAPE_USERNAME
      scrape-username: ${PLUGWERK_AUTH_ACTUATOR_SCRAPE_USERNAME:}
      # Scrape account plaintext password (BCrypt-encoded at bean creation).
      # Minimum 16 characters when set; 32+ recommended. Rotate by changing the env
      # var and restarting the server.
      # Env: PLUGWERK_AUTH_ACTUATOR_SCRAPE_PASSWORD
      # Generate with: openssl rand -base64 32
      scrape-password: ${PLUGWERK_AUTH_ACTUATOR_SCRAPE_PASSWORD:}

    oidc:
      # SSRF guard for OIDC discovery and stored issuer/endpoint URIs (#479).
      # Default: false → reject private/loopback/link-local/metadata hosts.
      # Set to true ONLY for local dev against Keycloak / mock-oauth2-server
      # bound to localhost. NEVER in production — a startup WARN is logged
      # whenever this is true so an accidental flip is visible.
      # Env: PLUGWERK_AUTH_OIDC_ALLOW_PRIVATE_DISCOVERY_URIS
      allow-private-discovery-uris: ${PLUGWERK_AUTH_OIDC_ALLOW_PRIVATE_DISCOVERY_URIS:false}

      # Comma-separated exact-match host blocklist. Empty (the default)
      # means "use the hardcoded defaults": localhost, metadata.google.internal,
      # metadata. Setting a non-empty list REPLACES the defaults entirely
      # — operators with a legitimate `metadata` public host need to drop
      # it from the override. Case-insensitive.
      # Env: PLUGWERK_AUTH_OIDC_BLOCKED_HOST_NAMES
      blocked-host-names: ${PLUGWERK_AUTH_OIDC_BLOCKED_HOST_NAMES:}

      # Comma-separated suffix blocklist. Empty (the default) means "use
      # the hardcoded defaults": .localhost, .local, .lan, .internal.
      # Setting a non-empty list REPLACES the defaults entirely — drop the
      # suffix from the override if your operator legitimately uses it.
      # Suffixes without a leading `.` get one prepended automatically so
      # `corp.example.com` matches `idp.corp.example.com` but not
      # `evilcorp.example.com`. Case-insensitive.
      # Env: PLUGWERK_AUTH_OIDC_BLOCKED_HOST_SUFFIXES
      blocked-host-suffixes: ${PLUGWERK_AUTH_OIDC_BLOCKED_HOST_SUFFIXES:}

      # Refuse to start the server if any ENABLED OIDC provider's client
      # secret is undecryptable under the current PLUGWERK_AUTH_ENCRYPTION_KEY
      # (#501). Default false → server boots, affected providers are skipped
      # with an ERROR log line per provider, and Sign-in via that provider
      # silently 4xx's. Set true in production deployments where a half-broken
      # login surface is worse than a fail-closed restart loop. The startup
      # error message lists every affected registrationId so one boot attempt
      # surfaces the complete list.
      # Env: PLUGWERK_AUTH_OIDC_FAIL_FAST_ON_UNDECRYPTABLE_PROVIDERS
      fail-fast-on-undecryptable-providers: ${PLUGWERK_AUTH_OIDC_FAIL_FAST_ON_UNDECRYPTABLE_PROVIDERS:false}

  # Upload and download-tracking settings were moved to the `application_setting` database
  # table in 1.0.0-alpha.2 (ADR-0016). The environment variables PLUGWERK_UPLOAD_MAX_FILE_SIZE_MB,
  # PLUGWERK_TRACKING_ENABLED, PLUGWERK_TRACKING_CAPTURE_IP, PLUGWERK_TRACKING_ANONYMIZE_IP and
  # PLUGWERK_TRACKING_CAPTURE_USER_AGENT are no longer read. Manage these values via the
  # Admin UI or the `PATCH /api/v1/admin/settings` endpoint.

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
