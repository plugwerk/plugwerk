spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  liquibase:
    enabled: true

plugwerk:
  storage:
    type: fs
    fs:
      root: ${java.io.tmpdir}/plugwerk-smoke-test
  auth:
    admin-password: smoke-test-password
    rate-limit:
      max-attempts: 1000
      window-seconds: 3600
