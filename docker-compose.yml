services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plugwerk
      POSTGRES_USER: plugwerk
      POSTGRES_PASSWORD: plugwerk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plugwerk"]
      interval: 5s
      timeout: 5s
      retries: 5

  plugwerk-server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/plugwerk
      SPRING_DATASOURCE_USERNAME: plugwerk
      SPRING_DATASOURCE_PASSWORD: plugwerk
    ports:
      - "8080:8080"

volumes:
  postgres-data:
