services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: plugwerk
      POSTGRES_USER: plugwerk
      POSTGRES_PASSWORD: plugwerk
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      # postgres:18+ requires the volume at /var/lib/postgresql (not /var/lib/postgresql/data)
      # so PGDATA can live in a major-version-specific subdirectory alongside config.
      # See https://github.com/docker-library/postgres/pull/1259.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plugwerk"]
      interval: 5s
      timeout: 5s
      retries: 5

  plugwerk-server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PLUGWERK_DB_URL: jdbc:postgresql://postgres:5432/plugwerk
      PLUGWERK_DB_USERNAME: plugwerk
      PLUGWERK_DB_PASSWORD: plugwerk
      PLUGWERK_AUTH_JWT_SECRET: "${PLUGWERK_AUTH_JWT_SECRET:?Set PLUGWERK_AUTH_JWT_SECRET (min 32 chars)}"
      PLUGWERK_AUTH_ENCRYPTION_KEY: "${PLUGWERK_AUTH_ENCRYPTION_KEY:?Set PLUGWERK_AUTH_ENCRYPTION_KEY (exactly 16 chars)}"
      PLUGWERK_AUTH_ADMIN_PASSWORD: ${PLUGWERK_AUTH_ADMIN_PASSWORD:-}
    volumes:
      - plugwerk-artifacts:/var/plugwerk/artifacts
    ports:
      - "8080:8080"

  # Keycloak — local-only OIDC provider for developing #79 (browser login flow).
  # Not started by default; enable via the `keycloak` profile:
  #   docker compose --profile keycloak up -d
  #
  # The realm `plugwerk` is created from docker/keycloak/plugwerk-realm.json
  # at first start. It contains:
  #   - one OAuth2 client `plugwerk-local` (confidential, with PKCE),
  #     redirect URI http://localhost:8080/login/oauth2/code/* and webOrigin
  #     http://localhost:5173 for the Vite dev server.
  #   - two test users (alice / bob), password `password`, both with the
  #     verified email <name>@plugwerk.test.
  #
  # Issuer URI to register in the Plugwerk Admin UI:
  #   http://localhost:8081/realms/plugwerk
  # Client ID:     plugwerk-local
  # Client secret: local-dev-secret-do-not-use-in-prod
  #
  # Keycloak admin console: http://localhost:8081 (admin/admin).
  # Both the admin password and the client secret are intentionally weak —
  # this stack must never be exposed beyond localhost.
  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    profiles: ["keycloak"]
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
      - keycloak-data:/opt/keycloak/data
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck:
      # `start-dev` exposes a management endpoint on port 9000 once the realm
      # is loaded; that is the canonical readiness probe for Keycloak 26+.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Mailpit — local-only SMTP catch-all for developing the email pipeline (#253).
  # Not started by default; enable via the `mailpit` profile:
  #   docker compose --profile mailpit up -d mailpit
  #
  # Mailpit accepts every message sent to it without ever forwarding anywhere
  # — exactly what you want for verifying the SMTP wiring without spamming
  # real recipients. It is the actively-maintained successor to MailHog and
  # ships native multi-arch images (linux/amd64 + linux/arm64), so Apple
  # Silicon contributors do not pay the Rosetta tax MailHog forced.
  #
  # SMTP settings to enter in the Plugwerk Admin UI (Settings → Email → Server):
  #   Host:        mailpit        (when Plugwerk runs in this same compose stack)
  #                localhost      (when Plugwerk runs natively on the host)
  #   Port:        1025
  #   Encryption:  None (plain SMTP — Mailpit speaks no TLS by default)
  #   Username:    (leave blank)
  #   Password:    (leave blank)
  #   From addr:   noreply@plugwerk.local
  #
  # Mailpit Web UI: http://localhost:8025 — every captured message renders here,
  # plus a JSON API at the same origin for assertions in scripted tests.
  mailpit:
    image: axllent/mailpit:latest
    profiles: ["mailpit"]
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # Web UI + REST API
    healthcheck:
      # Mailpit exposes /readyz and /livez on the HTTP port; readyz is the
      # canonical readiness probe and goes 200 once the SMTP listener is
      # actually accepting connections (not just process-up).
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

volumes:
  postgres-data:
  plugwerk-artifacts:
  keycloak-data:
